<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12-Week Active Living Program</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap');

:root {
  --sage: #7a9e7e;
  --sage-light: #b8d4bb;
  --sage-dark: #4a6b4e;
  --cream: #faf7f2;
  --warm: #f0ebe1;
  --gold: #c9a84c;
  --gold-light: #e8d49e;
  --charcoal: #2c2c2c;
  --muted: #6b6b6b;
  --white: #ffffff;
  --coral: #d4856a;
  --coral-light: #f2c4b3;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--cream);
  color: var(--charcoal);
  line-height: 1.6;
  min-height: 100vh;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, var(--sage-dark) 0%, var(--sage) 60%, var(--sage-light) 100%);
  color: white;
  padding: 48px 40px 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 240px; height: 240px;
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
}
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.4rem;
  margin-bottom: 6px;
  position: relative;
  z-index: 1;
}
.header .subtitle {
  font-size: 0.95rem;
  font-weight: 300;
  opacity: 0.85;
  letter-spacing: 2px;
  text-transform: uppercase;
  position: relative;
  z-index: 1;
}
.header .tagline {
  margin-top: 14px;
  font-size: 0.95rem;
  font-style: italic;
  opacity: 0.72;
  font-family: 'Playfair Display', serif;
  position: relative;
  z-index: 1;
}

/* NAV TABS */
.nav-tabs {
  display: flex;
  background: var(--white);
  border-bottom: 2px solid var(--warm);
  overflow-x: auto;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.nav-tab {
  padding: 14px 22px;
  border: none;
  background: none;
  cursor: pointer;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.5px;
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s;
}
.nav-tab:hover { color: var(--sage-dark); }
.nav-tab.active {
  color: var(--sage-dark);
  border-bottom-color: var(--sage-dark);
}
.nav-tab .tab-week {
  font-size: 0.7rem;
  opacity: 0.7;
  display: block;
}
.nav-tab .tab-done {
  display: inline-block;
  width: 8px; height: 8px;
  background: var(--sage);
  border-radius: 50%;
  margin-left: 6px;
  vertical-align: middle;
}

/* CONTENT */
.content { max-width: 1100px; margin: 0 auto; padding: 32px 28px; }

/* OVERVIEW PAGE */
.overview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.overview-card {
  background: var(--white);
  border-radius: 14px;
  padding: 22px 18px;
  border-left: 4px solid var(--gold);
  box-shadow: var(--shadow);
  text-align: center;
}
.overview-card .icon { font-size: 2rem; margin-bottom: 8px; }
.overview-card h3 {
  font-family: 'Playfair Display', serif;
  font-size: 0.95rem;
  color: var(--sage-dark);
  margin-bottom: 4px;
}
.overview-card p { font-size: 0.82rem; color: var(--muted); }
.overview-card .big-num {
  font-size: 2rem;
  font-weight: 700;
  color: var(--sage-dark);
  font-family: 'Playfair Display', serif;
}

/* PROGRESS BAR */
.progress-section {
  background: var(--white);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 28px;
  box-shadow: var(--shadow);
}
.progress-section h3 {
  font-family: 'Playfair Display', serif;
  color: var(--sage-dark);
  margin-bottom: 16px;
  font-size: 1.2rem;
}
.phase-progress { margin-bottom: 14px; }
.phase-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 6px;
}
.progress-bar-bg {
  height: 10px;
  background: var(--warm);
  border-radius: 10px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 10px;
  transition: width 0.6s ease;
}
.fill-sage { background: linear-gradient(90deg, var(--sage-dark), var(--sage)); }
.fill-gold { background: linear-gradient(90deg, var(--gold), var(--gold-light)); }
.fill-coral { background: linear-gradient(90deg, var(--coral), var(--coral-light)); }

/* WEEK PAGE */
.week-header {
  background: var(--white);
  border-radius: 16px;
  padding: 24px 28px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
}
.week-header-left h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  color: var(--sage-dark);
}
.week-header-left .week-meta {
  font-size: 0.85rem;
  color: var(--muted);
  margin-top: 4px;
}
.phase-pill {
  padding: 6px 18px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.pill-sage { background: var(--sage-dark); color: white; }
.pill-gold { background: var(--gold); color: var(--charcoal); }
.pill-coral { background: var(--coral); color: white; }

/* NOTES AREA */
.week-notes {
  background: var(--white);
  border-radius: 14px;
  padding: 20px 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
}
.week-notes h4 {
  font-family: 'Playfair Display', serif;
  color: var(--sage-dark);
  margin-bottom: 10px;
}
.week-notes textarea {
  width: 100%;
  min-height: 80px;
  border: 1.5px solid var(--warm);
  border-radius: 10px;
  padding: 10px 14px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.88rem;
  color: var(--charcoal);
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
}
.week-notes textarea:focus { border-color: var(--sage); }

/* DAY CARD */
.day-card {
  background: var(--white);
  border-radius: 16px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.day-card-header {
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid transparent;
  transition: background 0.15s;
}
.day-card-header:hover { background: var(--warm); }
.day-card-header.open { border-bottom-color: var(--warm); }
.day-card-header .day-label {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  color: var(--charcoal);
}
.day-card-header .day-type {
  font-size: 0.78rem;
  color: var(--muted);
  margin-top: 2px;
}
.day-card-header .day-right { display: flex; align-items: center; gap: 12px; }
.completed-badge {
  background: var(--sage-light);
  color: var(--sage-dark);
  font-size: 0.72rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 12px;
  letter-spacing: 0.5px;
}
.chevron {
  font-size: 0.9rem;
  color: var(--muted);
  transition: transform 0.2s;
}
.chevron.open { transform: rotate(180deg); }

.day-body { padding: 20px 24px; display: none; }
.day-body.open { display: block; }

/* REST DAY */
.rest-day-body {
  padding: 20px 24px;
  text-align: center;
  color: var(--muted);
  font-style: italic;
  font-size: 0.9rem;
}
.complete-day-btn {
  margin-top: 12px;
  padding: 9px 22px;
  background: var(--sage-dark);
  color: white;
  border: none;
  border-radius: 10px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
.complete-day-btn:hover { background: var(--sage); }
.complete-day-btn.done { background: var(--sage-light); color: var(--sage-dark); }

/* EXERCISE TABLE */
.exercise-table { width: 100%; border-collapse: collapse; }
.exercise-table th {
  text-align: left;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  padding: 0 10px 10px;
}
.exercise-table td {
  padding: 8px 10px;
  vertical-align: middle;
  border-bottom: 1px solid var(--warm);
  font-size: 0.88rem;
}
.exercise-table tr:last-child td { border-bottom: none; }
.exercise-link {
  color: var(--sage-dark);
  text-decoration: none;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
.exercise-link:hover { color: var(--sage); }
.exercise-link .vid-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 20px; height: 20px;
  background: var(--coral);
  border-radius: 4px;
  color: white;
  font-size: 0.6rem;
  flex-shrink: 0;
}
.sets-reps {
  background: var(--warm);
  padding: 3px 10px;
  border-radius: 8px;
  font-size: 0.8rem;
  white-space: nowrap;
  color: var(--charcoal);
}
.weight-input {
  width: 90px;
  border: 1.5px solid var(--warm);
  border-radius: 8px;
  padding: 5px 8px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
  text-align: center;
}
.weight-input:focus { border-color: var(--sage); }
.notes-input {
  width: 100%;
  border: 1.5px solid var(--warm);
  border-radius: 8px;
  padding: 5px 8px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.82rem;
  outline: none;
  transition: border-color 0.2s;
}
.notes-input:focus { border-color: var(--sage); }

.day-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--warm);
  gap: 12px;
  flex-wrap: wrap;
}
.day-footer label { font-size: 0.83rem; color: var(--muted); }
.rating-stars { display: flex; gap: 4px; }
.star-btn {
  background: none;
  border: none;
  font-size: 1.3rem;
  cursor: pointer;
  color: #ddd;
  transition: color 0.15s, transform 0.1s;
  padding: 0 2px;
}
.star-btn.filled { color: var(--gold); }
.star-btn:hover { transform: scale(1.15); }

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white;
  border-radius: 18px;
  padding: 30px;
  max-width: 520px;
  width: 90%;
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  color: var(--sage-dark);
  margin-bottom: 8px;
}
.modal .modal-sets { font-size: 0.85rem; color: var(--muted); margin-bottom: 16px; }
.modal iframe {
  width: 100%;
  height: 280px;
  border-radius: 10px;
  border: none;
  background: #000;
}
.modal-close {
  position: absolute;
  top: 14px; right: 16px;
  background: var(--warm);
  border: none;
  border-radius: 50%;
  width: 32px; height: 32px;
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
  transition: background 0.15s;
}
.modal-close:hover { background: var(--coral-light); }
.modal-note {
  margin-top: 12px;
  font-size: 0.78rem;
  color: var(--muted);
  text-align: center;
  font-style: italic;
}
.modal-fallback-btn {
  display: block;
  margin: 10px auto 0;
  padding: 8px 20px;
  background: var(--sage-dark);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 0.85rem;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
  font-family: 'Source Sans 3', sans-serif;
}

/* TIPS */
.tips-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
  margin-top: 28px;
}
.tip-card {
  background: var(--sage-dark);
  color: white;
  border-radius: 14px;
  padding: 22px 20px;
}
.tip-card h3 {
  font-family: 'Playfair Display', serif;
  font-size: 0.95rem;
  margin-bottom: 10px;
  color: var(--gold-light);
}
.tip-card ul { list-style: none; padding: 0; }
.tip-card ul li {
  font-size: 0.82rem;
  padding: 3px 0 3px 16px;
  position: relative;
  opacity: 0.88;
}
.tip-card ul li::before {
  content: '✓';
  position: absolute;
  left: 0;
  color: var(--gold-light);
  font-size: 0.72rem;
}

.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  color: var(--sage-dark);
  margin: 28px 0 16px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--gold-light);
  display: inline-block;
}

/* SAVE INDICATOR */
.save-indicator {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--sage-dark);
  color: white;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 0.82rem;
  font-weight: 600;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 200;
}
.save-indicator.show { opacity: 1; }

/* ── NUTRITION PAGE ───────────────────────────────────────────── */
.nutr-hero {
  background: linear-gradient(135deg, var(--sage-dark), var(--sage));
  color: white;
  border-radius: 18px;
  padding: 32px 36px;
  margin-bottom: 28px;
  box-shadow: var(--shadow);
}
.nutr-hero h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  margin-bottom: 12px;
}
.nutr-hero p { font-size: 0.95rem; opacity: 0.92; margin-bottom: 10px; line-height: 1.7; }
.nutr-disclaimer {
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 10px 16px;
  font-size: 0.83rem !important;
  opacity: 0.88 !important;
  margin-top: 14px !important;
  margin-bottom: 0 !important;
}

.nutr-highlights {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
  margin-bottom: 36px;
}
.nutr-highlight-card {
  background: var(--white);
  border-radius: 16px;
  padding: 22px 16px;
  text-align: center;
  box-shadow: var(--shadow);
  border-top: 4px solid var(--gold);
}
.nutr-hl-icon { font-size: 2rem; margin-bottom: 8px; }
.nutr-hl-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; font-weight: 700; }
.nutr-hl-value { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--sage-dark); font-weight: 700; line-height: 1.3; }
.nutr-hl-value span { font-family: 'Source Sans 3', sans-serif; font-size: 0.78rem; color: var(--muted); font-weight: 400; display: block; }

.nutr-section-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.35rem;
  color: var(--sage-dark);
  margin: 36px 0 18px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--gold-light);
  display: inline-block;
}

.nutr-aging-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 8px;
}
.nutr-aging-card {
  background: var(--white);
  border-radius: 14px;
  padding: 22px 20px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--sage-light);
}
.nutr-aging-icon { font-size: 1.8rem; margin-bottom: 10px; }
.nutr-aging-card h4 { font-family: 'Playfair Display', serif; color: var(--sage-dark); margin-bottom: 8px; font-size: 1rem; }
.nutr-aging-card p { font-size: 0.84rem; color: var(--muted); line-height: 1.6; }

/* PLATE */
.nutr-plate-row {
  display: flex;
  gap: 32px;
  align-items: flex-start;
  flex-wrap: wrap;
  background: var(--white);
  border-radius: 18px;
  padding: 28px;
  box-shadow: var(--shadow);
  margin-bottom: 8px;
}
.nutr-plate-visual { flex-shrink: 0; text-align: center; }
.plate-outer {
  width: 180px; height: 180px;
  border-radius: 50%;
  background: var(--warm);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  margin: 0 auto 10px;
}
.plate-inner {
  width: 164px; height: 164px;
  border-radius: 50%;
  background: conic-gradient(
    var(--sage-light) 0deg 180deg,
    var(--coral-light) 180deg 270deg,
    var(--gold-light) 270deg 360deg
  );
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.plate-veg, .plate-protein, .plate-carb {
  position: absolute;
  font-size: 0.6rem;
  font-weight: 700;
  text-align: center;
  line-height: 1.3;
}
.plate-veg { top: 30px; left: 50%; transform: translateX(-50%); color: var(--sage-dark); }
.plate-protein { bottom: 28px; right: 16px; color: var(--coral); }
.plate-carb { bottom: 28px; left: 16px; color: #8b6914; }
.plate-caption { font-size: 0.78rem; color: var(--muted); font-style: italic; }
.nutr-plate-details { flex: 1; min-width: 240px; }
.plate-detail-item { display: flex; gap: 14px; margin-bottom: 16px; align-items: flex-start; }
.plate-detail-color { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; margin-top: 4px; }
.plate-detail-item strong { font-size: 0.88rem; color: var(--charcoal); display: block; margin-bottom: 3px; }
.plate-detail-item p { font-size: 0.82rem; color: var(--muted); margin: 0; line-height: 1.5; }

/* PROTEIN */
.nutr-protein-section { background: var(--white); border-radius: 16px; padding: 24px; box-shadow: var(--shadow); margin-bottom: 8px; }
.nutr-protein-intro { margin-bottom: 20px; }
.nutr-protein-intro p { font-size: 0.9rem; color: var(--muted); line-height: 1.65; }
.nutr-protein-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
.protein-source-card {
  background: var(--warm);
  border-radius: 12px;
  padding: 16px 14px;
  text-align: center;
}
.ps-emoji { font-size: 1.8rem; margin-bottom: 6px; }
.protein-source-card strong { display: block; font-size: 0.82rem; color: var(--charcoal); margin-bottom: 4px; }
.ps-amount { display: inline-block; background: var(--sage-dark); color: white; font-size: 0.72rem; font-weight: 700; padding: 2px 8px; border-radius: 8px; margin-bottom: 6px; }
.protein-source-card p { font-size: 0.75rem; color: var(--muted); margin: 0; line-height: 1.4; }

/* TIMING */
.nutr-timing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 8px; }
.nutr-timing-card {
  border-radius: 16px;
  padding: 24px 20px;
  box-shadow: var(--shadow);
}
.nutr-timing-card.pre { background: #edf4ed; border-top: 4px solid var(--sage); }
.nutr-timing-card.post { background: #fdf0ec; border-top: 4px solid var(--coral); }
.nutr-timing-card.sport { background: #fdf8ed; border-top: 4px solid var(--gold); }
.timing-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
.timing-time { font-size: 0.8rem; color: var(--sage-dark); font-weight: 600; margin-bottom: 10px; }
.nutr-timing-card h4 { font-family: 'Playfair Display', serif; color: var(--charcoal); margin-bottom: 12px; }
.nutr-timing-card ul { list-style: none; padding: 0; margin-bottom: 14px; }
.nutr-timing-card ul li { font-size: 0.83rem; color: var(--charcoal); padding: 4px 0 4px 14px; position: relative; }
.nutr-timing-card ul li::before { content: '•'; position: absolute; left: 0; color: var(--sage); }
.timing-note { font-size: 0.78rem; color: var(--muted); font-style: italic; line-height: 1.5; border-top: 1px solid rgba(0,0,0,0.08); padding-top: 10px; }

/* HYDRATION */
.nutr-hydration {
  background: var(--white);
  border-radius: 16px;
  padding: 28px;
  box-shadow: var(--shadow);
  display: flex;
  gap: 28px;

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentTab = 'overview';
let openDays = {};
const STORAGE_KEY = 'active_living_v2';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}
function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  showSaveIndicator();
}
function showSaveIndicator() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  clearTimeout(window._saveTimer);
  window._saveTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

let userData = loadData();

function getWeekData(week) {
  if (!userData[`w${week}`]) userData[`w${week}`] = { notes: '', days: {} };
  return userData[`w${week}`];
}
function getDayData(week, dayIdx) {
  const wd = getWeekData(week);
  if (!wd.days[dayIdx]) wd.days[dayIdx] = { completed: false, rating: 0, exercises: {} };
  return wd.days[dayIdx];
}
function getExerciseData(week, dayIdx, exIdx) {
  const dd = getDayData(week, dayIdx);
  if (!dd.exercises[exIdx]) dd.exercises[exIdx] = { weight: '', notes: '' };
  return dd.exercises[exIdx];
}

// Count completed workouts across all weeks
function countCompleted() {
  let total = 0;
  PROGRAM.forEach(wk => {
    wk.days.forEach((day, di) => {
      if (!day.rest) {
        const dd = getDayData(wk.week, di);
        if (dd.completed) total++;
      }
    });
  });
  return total;
}
function totalWorkouts() {
  let total = 0;
  PROGRAM.forEach(wk => wk.days.forEach(d => { if (!d.rest) total++; }));
  return total;
}
function phaseCompleted(phaseNum) {
  let done = 0, total = 0;
  PROGRAM.filter(w => w.phase === phaseNum).forEach(wk => {
    wk.days.forEach((day, di) => {
      if (!day.rest) {
        total++;
        if (getDayData(wk.week, di).completed) done++;
      }
    });
  });
  return { done, total };
}
function weekCompleted(week) {
  const wk = PROGRAM.find(w => w.week === week);
  return wk.days.every((d, di) => d.rest || getDayData(week, di).completed);
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderNav() {
  const nav = document.getElementById('navTabs');
  let html = `<button class="nav-tab ${currentTab==='overview'?'active':''}" onclick="switchTab('overview')">Overview</button>`;
  html += `<button class="nav-tab ${currentTab==='nutrition'?'active':''}" onclick="switchTab('nutrition')">🥗 Nutrition</button>`;
  PROGRAM.forEach(wk => {
    const done = weekCompleted(wk.week);
    html += `<button class="nav-tab ${currentTab===`w${wk.week}`?'active':''}" onclick="switchTab('w${wk.week}')">
      <span>Week ${wk.week}</span>
      <span class="tab-week">${wk.focus}${done?'<span class="tab-done"></span>':''}</span>
    </button>`;
  });
  nav.innerHTML = html;
}

function switchTab(tab) {
  currentTab = tab;
  renderNav();
  renderContent();
}

function renderContent() {
  if (currentTab === 'overview') renderOverview();
  else if (currentTab === 'nutrition') renderNutrition();
  else {
    const week = parseInt(currentTab.replace('w',''));
    renderWeek(week);
  }
}

function renderOverview() {

  const total = totalWorkouts();
  const pct = Math.round((done/total)*100);
  const p1 = phaseCompleted(1), p2 = phaseCompleted(2), p3 = phaseCompleted(3);

  const el = document.getElementById('mainContent');
  el.innerHTML = `
    <div class="overview-grid">
      <div class="overview-card">
        <div class="icon">🏋️‍♀️</div>
        <div class="big-num">${done}</div>
        <h3>Workouts Done</h3>
        <p>out of ${total} total sessions</p>
      </div>
      <div class="overview-card">
        <div class="icon">📈</div>
        <div class="big-num">${pct}%</div>
        <h3>Overall Progress</h3>
        <p>Keep going — every session counts!</p>
      </div>
      <div class="overview-card">
        <div class="icon">⭐</div>
        <div class="big-num">${getAvgRating()}</div>
        <h3>Avg Session Rating</h3>
        <p>out of 5 stars</p>
      </div>
      <div class="overview-card">
        <div class="icon">🏌️‍♀️</div>
        <div class="big-num">12</div>
        <h3>Weeks</h3>
        <p>Golf & pickleball friendly</p>
      </div>
    </div>

    <div class="progress-section">
      <h3>Phase Progress</h3>
      <div class="phase-progress">
        <div class="phase-label"><span>Phase 1 — Foundation (Weeks 1–4)</span><span>${p1.done}/${p1.total}</span></div>
        <div class="progress-bar-bg"><div class="progress-bar-fill fill-sage" style="width:${p1.total?Math.round(p1.done/p1.total*100):0}%"></div></div>
      </div>
      <div class="phase-progress">
        <div class="phase-label"><span>Phase 2 — Build (Weeks 5–8)</span><span>${p2.done}/${p2.total}</span></div>
        <div class="progress-bar-bg"><div class="progress-bar-fill fill-gold" style="width:${p2.total?Math.round(p2.done/p2.total*100):0}%"></div></div>
      </div>
      <div class="phase-progress">
        <div class="phase-label"><span>Phase 3 — Performance (Weeks 9–12)</span><span>${p3.done}/${p3.total}</span></div>
        <div class="progress-bar-bg"><div class="progress-bar-fill fill-coral" style="width:${p3.total?Math.round(p3.done/p3.total*100):0}%"></div></div>
      </div>
    </div>

    <div class="section-title">Tips for Success</div>
    <div class="tips-grid">
      <div class="tip-card">
        <h3>🏌️ Golf & Pickleball Days</h3>
        <ul>
          <li>These count as active days — don't add gym on same day</li>
          <li>Warm up 10 min before every game</li>
          <li>Stretch hips, shoulder, thoracic after each match</li>
          <li>Hydrate generously throughout</li>
        </ul>
      </div>
      <div class="tip-card">
        <h3>⚖️ Weight Management</h3>
        <ul>
          <li>Prioritize protein at every meal</li>
          <li>Aim for 7–8 hours of sleep nightly</li>
          <li>Stay hydrated: 64+ oz water daily</li>
          <li>Consistency beats intensity every time</li>
        </ul>
      </div>
      <div class="tip-card">
        <h3>🧘 Flexibility Tips</h3>
        <ul>
          <li>Hold stretches 30–45 seconds, never bounce</li>
          <li>Always stretch warm muscles</li>
          <li>Focus on hips, hamstrings, thoracic, shoulders</li>
          <li>Daily movement keeps joints healthy</li>
        </ul>
      </div>

        <h3>💪 Core & Safety</h3>
        <ul>
          <li>Engage core in every exercise</li>

function getAvgRating() {
  let sum = 0, count = 0;
  PROGRAM.forEach(wk => {
    wk.days.forEach((day, di) => {
      if (!day.rest) {
        const dd = getDayData(wk.week, di);
        if (dd.rating > 0) { sum += dd.rating; count++; }
      }
    });
  });
  return count ? (sum/count).toFixed(1) : '—';
}

function renderWeek(weekNum) {
  const wk = PROGRAM.find(w => w.week === weekNum);
  const wd = getWeekData(weekNum);
  const pillClass = wk.phase === 1 ? 'pill-sage' : wk.phase === 2 ? 'pill-gold' : 'pill-coral';

  let daysHtml = wk.days.map((day, di) => renderDay(wk, day, di)).join('');

  const el = document.getElementById('mainContent');
  el.innerHTML = `
    <div class="week-header">
      <div class="week-header-left">
        <h2>Week ${weekNum} — ${wk.focus}</h2>
        <div class="week-meta">Phase ${wk.phase}: ${wk.phaseLabel} &nbsp;·&nbsp; Mon · Wed · Fri gym &nbsp;·&nbsp; Tue/Thu/Sat/Sun: Golf, Pickleball, or Rest</div>
      </div>
      <span class="phase-pill ${pillClass}">Phase ${wk.phase}: ${wk.phaseLabel}</span>
    </div>
    <div class="week-notes">
      <h4>📝 Weekly Notes</h4>
      <textarea placeholder="How are you feeling this week? Any soreness, wins, or goals?" onchange="saveWeekNotes(${weekNum}, this.value)">${wd.notes || ''}</textarea>
    </div>
    ${daysHtml}
  `;
}

function renderDay(wk, day, di) {
  const dd = getDayData(wk.week, di);
  const isOpen = openDays[`${wk.week}-${di}`];

  if (day.rest) {
    return `
      <div class="day-card">
        <div class="day-card-header" style="cursor:default">
          <div>
            <div class="day-label">${day.day}</div>
            <div class="day-type">${day.type}</div>
          </div>
          <div class="day-right">
            ${dd.completed ? '<span class="completed-badge">✓ Done</span>' : ''}
          </div>
        </div>
        <div class="rest-day-body">
          🌿 ${day.type} — enjoy your active rest!
          <br>
          <button class="complete-day-btn ${dd.completed?'done':''}" onclick="toggleDayComplete(${wk.week},${di})">
            ${dd.completed ? '✓ Logged' : 'Log as Done'}
          </button>
        </div>
      </div>`;
  }

  const exRows = day.exercises.map((ex, ei) => {
    const ed = getExerciseData(wk.week, di, ei);
    const exInfo = EXERCISES[ex.name];
    const url = exInfo ? exInfo.url : `https://www.youtube.com/results?search_query=${encodeURIComponent(ex.name + ' exercise tutorial')}`;
    return `
      <tr>
        <td>
          <a class="exercise-link" href="#" onclick="openVideo('${escapeAttr(ex.name)}','${escapeAttr(ex.sets)}','${encodeURIComponent(url)}');return false;">
            <span class="vid-icon">▶</span>${ex.name}
          </a>
        </td>
        <td><span class="sets-reps">${ex.sets}</span></td>
        <td><input class="weight-input" type="text" placeholder="lbs / kg" value="${ed.weight||''}" onchange="saveExWeight(${wk.week},${di},${ei},this.value)" /></td>
        <td><input class="notes-input" type="text" placeholder="Notes..." value="${ed.notes||''}" onchange="saveExNotes(${wk.week},${di},${ei},this.value)" /></td>
      </tr>`;
  }).join('');

  const stars = [1,2,3,4,5].map(s =>
    `<button class="star-btn ${dd.rating>=s?'filled':''}" onclick="setRating(${wk.week},${di},${s})">★</button>`
  ).join('');

  return `
    <div class="day-card">
      <div class="day-card-header ${isOpen?'open':''}" onclick="toggleDay(${wk.week},${di})">
        <div>
          <div class="day-label">${day.day}</div>
          <div class="day-type">${day.type}</div>
        </div>
        <div class="day-right">
          ${dd.completed ? '<span class="completed-badge">✓ Completed</span>' : ''}
          <span class="chevron ${isOpen?'open':''}">▼</span>
        </div>
      </div>
      <div class="day-body ${isOpen?'open':''}">
        <table class="exercise-table">
          <thead><tr>
            <th>Exercise (click ▶ for video)</th>
            <th>Sets / Reps</th>
            <th>Weight Used</th>
            <th>Notes</th>
          </tr></thead>
          <tbody>${exRows}</tbody>
        </table>
        <div class="day-footer">
          <div>
            <label>Rate this session:</label>
            <div class="rating-stars">${stars}</div>
          </div>
          <button class="complete-day-btn ${dd.completed?'done':''}" onclick="toggleDayComplete(${wk.week},${di})">
            ${dd.completed ? '✓ Completed' : 'Mark Complete'}
          </button>
        </div>
      </div>
    </div>`;
}

function escapeAttr(str) {
  return str.replace(/'/g,"&#39;").replace(/"/g,'&quot;');
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────

function toggleDay(week, di) {
  const key = `${week}-${di}`;
  openDays[key] = !openDays[key];
  renderContent();
}

function toggleDayComplete(week, di) {
  const dd = getDayData(week, di);
  dd.completed = !dd.completed;
  saveData(userData);
  renderContent();
}

function setRating(week, di, stars) {
  const dd = getDayData(week, di);
  dd.rating = stars;
  saveData(userData);
  renderContent();
}

function saveWeekNotes(week, val) {
  const wd = getWeekData(week);
  wd.notes = val;
  saveData(userData);
}

function saveExWeight(week, di, ei, val) {
  getExerciseData(week, di, ei).weight = val;
  saveData(userData);
}

function saveExNotes(week, di, ei, val) {
  getExerciseData(week, di, ei).notes = val;
  saveData(userData);
}

// ─── VIDEO MODAL ─────────────────────────────────────────────────────────────

function openVideo(name, sets, encodedUrl) {
  const url = decodeURIComponent(encodedUrl);
  document.getElementById('modalTitle').textContent = name;
  document.getElementById('modalSets').textContent = sets;
  // Use YouTube search embed
  const query = encodeURIComponent(name + ' exercise form tutorial');
  document.getElementById('modalIframe').src = `https://www.youtube.com/embed?listType=search&list=${query}`;
  document.getElementById('modalLink').href = url;
  document.getElementById('videoModal').classList.add('open');
}

function closeModal() {
  document.getElementById('videoModal').classList.remove('open');
  document.getElementById('modalIframe').src = '';
}

document.getElementById('videoModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderNav();
renderContent();
</script>
